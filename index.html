<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Downloads</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Poppins:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Tomorrow:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-bg: #0f0f0f;
        --color-bg-secondary: #1a1a1a;
        --color-text: #ffffff;
        --color-accent: #00d4ff;
        --color-accent2: #ff6b35;
        --color-card: #1e1e1e;
        --color-card-hover: #2a2a2a;
        --color-btn: #00d4ff;
        --color-btn-hover: #ff6b35;
        --color-btn-text: #0f0f0f;
        --color-btn-text-hover: #fff;
        --color-btn-glow: #00d4ff;
      }
      body.light-mode {
        --color-bg: #f6f2ff;
        --color-bg-secondary: #e9dcff;
        --color-text: #ffffff;
        --color-accent: #ff006f;
        --color-accent2: #00a0c0;
        --color-card: #280064;
        --color-card-hover: #3b0a8c;
        --color-btn: #ff006f;
        --color-btn-hover: #00a0c0;
        --color-btn-text: #ffffff;
        --color-btn-text-hover: #ffffff;
        --color-btn-glow: #ff70e5;
      }
      body,
      *,
      a,
      img,
      button,
      input,
      textarea {
        -webkit-user-select: none !important;
        -moz-user-select: none !important;
        -ms-user-select: none !important;
        user-select: none !important;
        -webkit-touch-callout: none !important;
      }

      /* Optimized scrolling performance */
      html {
        scroll-behavior: smooth;
      }

      body {
        touch-action: pan-y pinch-zoom;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
        /* Remove hardware acceleration on mobile to prevent black screen */
      }

      /* Allow scrolling on main container */
      .container {
        touch-action: pan-y pinch-zoom;
      }

      /* Prevent hover-like effects on touch devices */
      @media (hover: none) {
        .game {
          transition: none;
          will-change: auto;
        }

        .download-btn,
        .toggle-view-btn {
          transition: none;
        }

        /* Add minimal touch feedback */
        .game:active {
          opacity: 0.95;
          transition: opacity 0.05s ease-out;
        }
      }

      /* Performance optimization for mobile */
      @media (max-width: 768px) {
        * {
          -webkit-tap-highlight-color: transparent;
        }

        .game {
          /* Remove hardware acceleration on mobile */
          backface-visibility: hidden;
        }
      }

      /* Loading spinner animation */
      .loading-spinner {
        display: inline-block;
        animation: spin 2s linear infinite;
        font-size: 2em;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Error retry button hover effects */
      .retry-btn {
        background: var(--color-accent);
        color: var(--color-btn-text);
        border: 2px solid var(--color-accent);
        padding: 12px 24px;
        border-radius: 0;
        font-family: "Press Start 2P", monospace;
        font-size: 12px;
        cursor: pointer;
        box-shadow: 0 4px 0 var(--color-accent2);
        transition: all 0.2s ease;
        text-transform: uppercase;
      }

      .retry-btn:hover {
        background: var(--color-accent2);
        transform: translateY(-2px);
        box-shadow: 0 6px 0 var(--color-accent);
      }

      .retry-btn:active {
        transform: translateY(0);
        box-shadow: 0 2px 0 var(--color-accent2);
      }
      body {
        font-size: 13px;
        background: var(--color-bg);
        color: var(--color-text);
        font-family: "Press Start 2P", "Poppins", "Roboto", Arial, sans-serif;
        transition:
          background 0.5s ease,
          color 0.5s ease;
        background-image: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        background-attachment: fixed;
      }
      .container {
        padding: 15px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .sticky-search {
        position: sticky;
        top: 0;
        z-index: 1000;
        background: rgba(15, 15, 15, 0.9);
        padding: 20px 0 10px 0;
        box-shadow:
          0 0 15px var(--color-accent),
          0 2px 5px rgba(0, 0, 0, 0.2);
        border-bottom: 4px solid var(--color-accent);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-image: linear-gradient(90deg, rgba(10, 10, 10, 0.95) 0%, rgba(26, 26, 26, 0.95) 100%);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      .theme-toggle-btn {
        display: none !important;
      }
      /* Loading overlay */
      #loading-overlay {
        position: fixed;
        z-index: 2000;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          radial-gradient(ellipse at top left, rgba(168, 85, 247, 0.18) 0%, transparent 50%),
          #0a0812;
        display: flex !important;
        align-items: center;
        justify-content: center;
        transition: opacity 0.3s ease;
        width: 100vw;
        height: 100vh;
        flex-direction: column;
        gap: 20px;
        opacity: 1;
        visibility: visible;
      }
      #loading-overlay.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .loading-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .loading-text {
        color: #c4b0e8;
        font-size: 1em;
        text-align: center;
        margin-top: 10px;
        font-family: "Tomorrow", sans-serif;
        letter-spacing: 0.5px;
      }
      .reload-btn {
        background: linear-gradient(135deg, #a855f7, #ec4899);
        color: #ffffff;
        border: none;
        padding: 12px 24px;
        border-radius: 999px;
        font-size: 0.9em;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
        font-family: "Tomorrow", sans-serif;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .reload-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 28px rgba(168, 85, 247, 0.55);
      }
      .reload-btn:active {
        transform: translateY(0);
      }

      /* Mobile responsive for loading overlay */
      @media (max-width: 768px) {
        .loading-content {
          gap: 15px;
        }
        .loading-text {
          font-size: 1em;
          margin-top: 5px;
        }
        .reload-btn {
          padding: 10px 20px;
          font-size: 0.8em;
        }

        /* Disable complex animations on mobile */
        .game {
          transition: none;
        }

        .download-btn {
          transition: none;
        }

        /* Simplify background for mobile */
        body {
          background-image: none;
          background: var(--color-bg);
        }
      }

      @media (max-width: 480px) {
        .loading-content {
          gap: 12px;
        }
        .loading-text {
          font-size: 0.9em;
        }
        .reload-btn {
          padding: 8px 16px;
          font-size: 0.75em;
        }
      }
      .pixel-spinner {
        width: 64px;
        height: 64px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 2px;
      }
      .pixel-spinner div {
        width: 14px;
        height: 14px;
        background: #a855f7;
        opacity: 0.7;
        animation: pixel-blink 1.2s infinite;
        border-radius: 2px;
      }
      .pixel-spinner div:nth-child(1) {
        animation-delay: 0s;
      }
      .pixel-spinner div:nth-child(2) {
        animation-delay: 0.1s;
      }
      .pixel-spinner div:nth-child(3) {
        animation-delay: 0.2s;
      }
      .pixel-spinner div:nth-child(4) {
        animation-delay: 0.3s;
      }
      .pixel-spinner div:nth-child(5) {
        animation-delay: 0.4s;
      }
      .pixel-spinner div:nth-child(6) {
        animation-delay: 0.5s;
      }
      .pixel-spinner div:nth-child(7) {
        animation-delay: 0.6s;
      }
      .pixel-spinner div:nth-child(8) {
        animation-delay: 0.7s;
      }
      .pixel-spinner div:nth-child(9) {
        animation-delay: 0.8s;
      }
      .pixel-spinner div:nth-child(10) {
        animation-delay: 0.9s;
      }
      .pixel-spinner div:nth-child(11) {
        animation-delay: 1s;
      }
      .pixel-spinner div:nth-child(12) {
        animation-delay: 1.1s;
      }
      .pixel-spinner div:nth-child(13) {
        animation-delay: 1.2s;
      }
      .pixel-spinner div:nth-child(14) {
        animation-delay: 1.3s;
      }
      .pixel-spinner div:nth-child(15) {
        animation-delay: 1.4s;
      }
      .pixel-spinner div:nth-child(16) {
        animation-delay: 1.5s;
      }
      @keyframes pixel-blink {
        0%,
        100% {
          opacity: 0.7;
        }
        50% {
          opacity: 0.2;
        }
      }
      /* Card and button hover/focus effects */
      .game {
        transition:
          transform 0.1s ease-out,
          box-shadow 0.1s ease-out,
          background 0.1s ease-out;
      }
      /* Only apply hover effects on devices that support hover */
      @media (hover: hover) and (pointer: fine) {
        .game:hover,
        .game:focus {
          background: var(--color-card-hover);
          transform: translateY(-7px) scale(1.04);
          box-shadow: 0 12px 0 var(--color-accent);
        }
      }

      /* Touch-friendly active states for mobile */
      @media (hover: none) {
        .game:active {
          background: var(--color-card-hover);
          transform: translateY(-2px) scale(1.01);
          box-shadow: 0 6px 0 var(--color-accent);
          transition: all 0.1s ease;
        }
      }
      .download-btn,
      .hot-category-btn,
      .toggle-view-btn {
        transition:
          background 0.1s ease-out,
          color 0.1s ease-out,
          box-shadow 0.1s ease-out,
          border 0.1s ease-out;
      }
      .download-btn:focus,
      .hot-category-btn:focus,
      .toggle-view-btn:focus {
        outline: 2px solid var(--color-accent2);
        outline-offset: 2px;
      }
      /* General Styling */
      body {
        font-size: 13px;
        background: var(--color-bg);
        color: var(--color-text);
        font-family: "Press Start 2P", "Poppins", "Roboto", Arial, sans-serif;
      }

      .container {
        padding: 15px;
        max-width: 1200px;
        margin: 0 auto;
      }

      /* Search Bar */
      .sticky-search {
        position: sticky;
        top: 0;
        z-index: 1000;
        background: rgba(15, 15, 15, 0.9);
        padding: 20px 0 10px 0;
        box-shadow:
          0 0 15px var(--color-accent),
          0 2px 5px rgba(0, 0, 0, 0.2);
        border-bottom: 4px solid var(--color-accent);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-image: linear-gradient(90deg, rgba(10, 10, 10, 0.95) 0%, rgba(26, 26, 26, 0.95) 100%);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }

      .search-bar-row {
        display: flex;
        align-items: center;
        gap: 18px;
        justify-content: center;
        width: 100%;
      }

      .search-bar {
        display: flex;
        align-items: center;
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
      }

      .search-bar input {
        width: 100%;
        padding: 14px 20px;
        font-size: 14px;
        border: 3px solid var(--color-accent);
        border-radius: 8px;
        background: #1a1a1a;
        color: #ffffff;
        font-family: "Press Start 2P", monospace;
        outline: none;
        box-shadow:
          0 0 10px var(--color-accent),
          0 4px 0 var(--color-accent);
        letter-spacing: 1px;
        text-align: center;
      }

      .search-bar input:focus {
        border-color: var(--color-accent2);
        box-shadow:
          0 0 15px var(--color-accent2),
          0 4px 0 var(--color-accent2);
        text-align: left;
      }

      .search-bar input::placeholder {
        color: rgba(255, 255, 255, 0.4);
        font-style: italic;
        font-family: "Press Start 2P", monospace;
      }

      .filter-inline {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-left: 12px;
      }

      .filter-inline label {
        color: var(--color-accent);
        font-size: 13px;
        font-family: "Press Start 2P", monospace;
        margin-right: 6px;
        text-shadow: 0 0 5px var(--color-accent);
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: center;
        margin: 15px 0 0 0;
      }

      .filter-group {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .filter-group label {
        font-size: 13px;
        margin-bottom: 3px;
        color: #bdb6c5;
      }

      .filter-group select,
      .filter-group input[type="date"] {
        padding: 7px 12px;
        border-radius: 6px;
        border: 1px solid #3a3240;
        background: #1e1a22;
        color: #f3f3f3;
        font-size: 15px;
      }

      /* Optimized responsive grid */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 24px;
        margin-top: 30px;
        contain: layout style;
      }

      .game {
        background: #1e1e1e;
        border: 3px solid var(--color-accent);
        border-radius: 12px;
        overflow: hidden;
        box-shadow:
          0 8px 25px rgba(0, 212, 255, 0.15),
          0 4px 12px rgba(0, 0, 0, 0.5);
        transition: all 0.2s ease;
        position: relative;
        z-index: 1;
      }

      .game-image-container {
        position: relative;
        overflow: hidden;
        border-radius: 8px 8px 0 0;
      }

      @media (hover: hover) and (pointer: fine) {
        .game:hover {
          transform: translateY(-8px) scale(1.05);
          box-shadow:
            0 15px 35px rgba(0, 212, 255, 0.4),
            0 8px 20px rgba(255, 107, 53, 0.3);
          background: #2a2a2a;
        }
      }

      .game img {
        width: 100%;
        aspect-ratio: 1/1;
        max-height: 220px;
        object-fit: cover;
        image-rendering: pixelated;
        background: #0a0a0a;
        border-bottom: 3px solid var(--color-accent);
        border-radius: 8px 8px 0 0;
        display: block;
        position: relative;
        z-index: 1;
        transition: transform 0.2s ease;
      }

      .game-info {
        padding: 18px 12px 16px 12px;
        text-align: center;
        position: relative;
        z-index: 2;
      }

      .game-info h3 {
        margin: 0 0 10px;
        font-size: 0.7em;
        color: var(--color-text);
        font-family: "Press Start 2P", monospace;
        text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.8);
        font-weight: bold;
        display: -webkit-box;
        line-clamp: 2;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
        min-height: 2.2em;
        max-height: 2.2em;
        position: relative;
      }

      .game-info p {
        margin: 0 0 8px;
        color: var(--color-accent);
        font-size: 7px;
        font-family: "Press Start 2P", monospace;
      }

      .popular-badge {
        position: absolute;
        top: 8px;
        right: 8px;
        background: linear-gradient(45deg, #ff6b6b, #ffe66d);
        color: #392467;
        font-size: 6px;
        font-family: "Press Start 2P", monospace;
        font-weight: bold;
        padding: 3px 6px;
        border-radius: 8px;
        border: 1px solid #ffffff;
        box-shadow: 0 0 6px rgba(255, 107, 107, 0.7);
        text-transform: uppercase;
        letter-spacing: 0.3px;
        animation: pulse-glow 2s infinite;
        z-index: 10;
      }

      @keyframes pulse-glow {
        0%,
        100% {
          box-shadow: 0 0 6px rgba(255, 107, 107, 0.7);
          transform: scale(1);
        }
        50% {
          box-shadow: 0 0 12px rgba(255, 107, 107, 0.9);
          transform: scale(1.05);
        }
      }

      .downloaded-badge {
        position: absolute;
        top: 8px;
        left: 8px;
        background: linear-gradient(45deg, #1aff7a, #00d4aa);
        color: #0f0f0f;
        font-size: 6px;
        font-family: "Press Start 2P", monospace;
        font-weight: bold;
        padding: 3px 6px;
        border-radius: 8px;
        border: 1px solid #ffffff;
        box-shadow: 0 0 8px rgba(26, 255, 122, 0.8);
        text-transform: uppercase;
        letter-spacing: 0.3px;
        animation: downloaded-pulse 2s infinite;
        z-index: 10;
      }

      @keyframes downloaded-pulse {
        0%,
        100% {
          box-shadow: 0 0 8px rgba(26, 255, 122, 0.8);
          transform: scale(1);
        }
        50% {
          box-shadow: 0 0 15px rgba(26, 255, 122, 1);
          transform: scale(1.05);
        }
      }

      /* Downloaded button styling */
      .download-btn.downloaded {
        background: linear-gradient(45deg, #1aff7a, #00d4aa);
        color: #0f0f0f;
        border-color: #1aff7a;
        box-shadow:
          0 4px 15px rgba(26, 255, 122, 0.4),
          0 2px 8px rgba(0, 0, 0, 0.4);
      }

      .download-btn.downloaded:hover {
        background: linear-gradient(45deg, #00d4aa, #1aff7a);
        box-shadow:
          0 6px 20px rgba(26, 255, 122, 0.6),
          0 3px 12px rgba(0, 0, 0, 0.5);
        transform: translateY(-3px) scale(1.05);
      }

      /* Light mode downloaded button */
      body.light-mode .download-btn.downloaded {
        background: linear-gradient(45deg, #1aff7a, #00d4aa);
        color: #0f0f0f;
        border-color: #1aff7a;
        box-shadow:
          0 0 10px rgba(26, 255, 122, 0.5),
          0 2px 0 #00a0c0;
      }

      body.light-mode .download-btn.downloaded:hover {
        background: linear-gradient(45deg, #00d4aa, #1aff7a);
        box-shadow:
          0 0 15px rgba(26, 255, 122, 0.7),
          0 2px 0 #00a0c0;
      }

      body.light-mode .downloaded-badge {
        background: linear-gradient(45deg, #1aff7a, #00d4aa);
        color: #0f0f0f;
        box-shadow: 0 0 10px rgba(26, 255, 122, 0.8);
      }

      /* Optimized download button */
      .download-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 20px;
        background: linear-gradient(45deg, #00d4ff, #0099cc);
        color: #0f0f0f;
        text-decoration: none;
        border-radius: 8px;
        font-size: 13px;
        font-family: "Press Start 2P", monospace;
        font-weight: bold;
        cursor: pointer;
        border: 3px solid #ffffff;
        transition: all 0.2s ease;
        box-shadow:
          0 4px 15px rgba(0, 212, 255, 0.3),
          0 2px 8px rgba(0, 0, 0, 0.4);
        position: relative;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        overflow: hidden;
      }

      .download-btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
        transition: left 0.5s ease;
      }

      .download-btn.loading {
        pointer-events: none;
        background: linear-gradient(45deg, #cccccc, #999999);
        color: #666666;
        border-color: #cccccc;
      }

      .download-spinner {
        width: 10px;
        height: 10px;
        border: 1.5px solid transparent;
        border-top: 1.5px solid currentColor;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        display: none;
        flex-shrink: 0;
      }

      .download-btn.loading .download-spinner {
        display: block;
      }

      .download-btn.loading .download-text {
        display: none;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Simplified button effects - only on desktop hover */
      @media (hover: hover) and (pointer: fine) and (prefers-reduced-motion: no-preference) {
        .download-btn::before {
          content: "";
          position: absolute;
          top: 0;
          left: -100%;
          width: 100%;
          height: 100%;
          background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
          transition: left 0.3s ease-out;
          opacity: 0;
        }

        .download-btn:hover::before {
          left: 100%;
          opacity: 1;
        }
      }

      /* Remove heavy animations on mobile/reduced motion */
      @media (prefers-reduced-motion: reduce) {
        .download-btn::before,
        .download-btn::after {
          display: none;
        }
      }

      .download-btn:hover {
        background: linear-gradient(45deg, #ff6b35, #ff4500);
        color: #ffffff;
        box-shadow:
          0 6px 20px rgba(255, 107, 53, 0.5),
          0 3px 12px rgba(0, 0, 0, 0.5);
        transform: translateY(-3px) scale(1.05);
      }

      .download-btn:hover::before {
        left: 100%;
      }

      .download-btn:hover::before {
        animation: glitter-slide 1s infinite;
      }

      /* Hiệu ứng cho các nút download khi hover */
      .game:hover .download-btn {
        background: #1aff7a;
        color: #392467;
        box-shadow:
          0 0 20px #1aff7a,
          0 0 40px #1aff7a,
          0 2px 0 var(--color-bg-secondary);
        border-color: #ffffff;
        transform: translateY(-2px) scale(1.05);
      }

      .download-btn .ripple {

        background: var(--color-bg-secondary);
        color: var(--color-accent2);
        border: 2px solid var(--color-accent2);
        box-shadow: 0 2px 0 var(--color-accent);
      }

      .theme-toggle-btn:hover {
        background: var(--color-accent2);
        color: var(--color-btn-text);
        box-shadow: 0 2px 0 var(--color-accent);
      }

      .hot-category-btn {
        background: var(--color-bg-secondary);
        color: var(--color-accent2);
        border: 2px solid var(--color-accent2);
        box-shadow: 0 2px 0 var(--color-accent);
      }

      .hot-category-btn.active,
      .hot-category-btn:hover {
        background: var(--color-accent2);
        color: var(--color-btn-text);
        box-shadow: 0 2px 0 var(--color-accent);
      }

      .pagination-btn {
        background: var(--color-bg-secondary);
        color: var(--color-accent2);
        border: 2px solid var(--color-accent2);
        box-shadow: 0 2px 0 var(--color-accent);
      }

      .pagination-btn.active,
      .pagination-btn:hover {
        background: var(--color-accent2);
        color: var(--color-btn-text);
        box-shadow: 0 2px 0 var(--color-accent);
      }

      /* ═══════════════════════════════════════════════
         GBA RETRO WARM PARCHMENT THEME
         ═══════════════════════════════════════════════ */
      :root {
        --color-bg: #f0dab8;
        --color-bg-secondary: #e8cfa0;
        --color-text: #2a1005;
        --color-accent: #3d1208;
        --color-accent2: #8b4513;
        --color-card: #fdf5e6;
        --color-card-hover: #f8edd8;
        --color-btn: #3d1208;
        --color-btn-hover: #5c1a10;
        --color-btn-text: #ffffff;
        --color-btn-text-hover: #ffffff;
        --color-btn-glow: rgba(61, 18, 8, 0.35);
        --figma-muted: #a07050;
        --figma-border: #c8a068;
        --figma-soft-text: #6b4c36;
        --figma-gradient: linear-gradient(180deg, #3d1208 0%, #5c1a10 100%);
        --retro-search-bg: #f5e8d0;
        --retro-pill-inactive: rgba(61, 18, 8, 0.08);
        --retro-shadow: 0 4px 16px rgba(61, 18, 8, 0.12);
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(ellipse at top left, rgba(168, 85, 247, 0.18) 0%, transparent 50%),
          radial-gradient(ellipse at bottom right, rgba(236, 72, 153, 0.12) 0%, transparent 45%),
          linear-gradient(180deg, #130d22 0%, var(--color-bg) 30rem) !important;
        color: var(--color-text);
        font-family: "Tomorrow", "Roboto", Arial, sans-serif;
        margin: 0;
        padding-bottom: 48px;
      }

      body::after {
        display: none !important;
      }

      body::before {
        opacity: 0.18;
        background-image:
          linear-gradient(
            0deg,
            transparent 24%,
            rgba(168, 85, 247, 0.04) 25%,
            rgba(168, 85, 247, 0.04) 26%,
            transparent 27%
          ),
          linear-gradient(
            90deg,
            transparent 24%,
            rgba(168, 85, 247, 0.04) 25%,
            rgba(168, 85, 247, 0.04) 26%,
            transparent 27%
          ) !important;
        background-size: 72px 72px !important;
      }

      .container {
        width: min(100% - 40px, 1240px);
        min-height: 100vh;
        padding: 28px 0 24px;
        background: transparent;
      }

      .app-topbar {
        display: block;
        margin: 0 0 22px;
        padding: 28px;
        border: 1px solid rgba(168, 85, 247, 0.2);
        border-radius: 24px;
        background: linear-gradient(135deg, rgba(26, 18, 40, 0.96), rgba(10, 8, 18, 0.92));
        box-shadow: 0 22px 80px rgba(0, 0, 0, 0.36);
      }

      .app-title {
        margin: 0;
        color: var(--color-accent);
        font-family: "Tomorrow", sans-serif;
        font-size: clamp(32px, 6vw, 72px);
        font-weight: 800;
        line-height: 0.95;
        letter-spacing: -1.5px;
        text-shadow: 0 0 40px rgba(168, 85, 247, 0.5), 4px 4px 0 #0a0812;
      }

      .app-title::after {
        display: block;
        max-width: 560px;
        margin-top: 14px;
        color: var(--figma-soft-text);
        font-size: 16px;
        font-weight: 500;
        line-height: 1.5;
        letter-spacing: 0.1px;
        text-shadow: none;
      }

      .sticky-search {
        position: sticky;
        top: 0;
        z-index: 1000;
        display: block;
        margin: 0 0 32px;
        padding: 18px;
        border: 1px solid rgba(168, 85, 247, 0.2);
        border-radius: 20px;
        background: rgba(10, 8, 18, 0.88);
        background-image: none;
        box-shadow:
          0 18px 60px rgba(0, 0, 0, 0.32),
          0 0 40px rgba(168, 85, 247, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      .sticky-search > div:first-child {
        display: none;
      }

      .search-bar-row {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 18px;
      }

      .search-bar {
        position: relative;
        max-width: none;
        flex: 1 1 520px;
      }

      .search-bar::before {
        content: "";
        position: absolute;
        left: 20px;
        top: 50%;
        z-index: 1;
        width: 15px;
        height: 15px;
        border: 2px solid #a855f7;
        border-radius: 50%;
        transform: translateY(-50%);
        opacity: 0.85;
      }

      .search-bar::after {
        content: "";
        position: absolute;
        left: 34px;
        top: calc(50% + 8px);
        z-index: 1;
        width: 8px;
        height: 2px;
        border-radius: 999px;
        background: #a855f7;
        transform: rotate(-45deg);
        opacity: 0.85;
      }

      .search-bar-row .search-bar::after {
        display: block !important;
      }

      .search-bar input {
        height: 56px;
        padding: 0 18px 0 54px;
        border: 1px solid rgba(168, 85, 247, 0.25);
        border-radius: 16px;
        background: rgba(17, 13, 30, 0.9);
        box-shadow: inset 0 1px 0 rgba(168, 85, 247, 0.05);
        color: #ffffff;
        font-family: "Tomorrow", sans-serif;
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.1px;
        text-align: left;
      }

      .search-bar input:focus {
        border-color: var(--color-accent);
        box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.22);
        transform: none;
      }

      .search-bar input::placeholder {
        color: rgba(242, 242, 242, 0.55);
        font-family: "Tomorrow", sans-serif;
        font-style: normal;
      }

      .toggle-view-btn {
        position: static;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 44px;
        width: 44px;
        height: 44px;
        margin: 0 0 0 10px;
        padding: 0;
        border: 1px solid rgba(168, 85, 247, 0.5);
        border-radius: 12px;
        background: rgba(168, 85, 247, 0.08);
        box-shadow: none;
        align-self: center;
        justify-self: flex-end;
        transition:
          border-color 0.18s ease,
          background 0.18s ease;
      }

      @media (hover: hover) and (pointer: fine) {
        .toggle-view-btn:hover {
          border-color: rgba(168, 85, 247, 0.8);
          background: rgba(168, 85, 247, 0.18);
        }
      }

      .toggle-view-btn span {
        display: none !important;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        line-height: 0;
      }

      .toggle-view-btn span.active {
        display: inline-flex !important;
      }

      .toggle-view-btn svg rect {
        fill: #a855f7;
        stroke: var(--color-bg);
      }

      .filter-inline {
        margin: 0;
        gap: 18px;
        justify-content: flex-end;
        flex: 0 0 auto;
        align-items: center;
      }

      .filter-field {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .filter-inline label {
        color: var(--figma-soft-text);
        font-family: "Tomorrow", sans-serif;
        font-size: 13px;
        font-weight: 600;
        text-shadow: none;
      }

      .filter-inline select {
        min-width: 132px;
        height: 42px;
        padding: 0 42px 0 16px;
        border: 1px solid rgba(168, 85, 247, 0.3);
        border-radius: 999px;
        background:
          linear-gradient(45deg, transparent 50%, #c4b0e8 50%) right 20px center / 6px 6px no-repeat,
          linear-gradient(135deg, #c4b0e8 50%, transparent 50%) right 14px center / 6px 6px no-repeat,
          rgba(17, 13, 30, 0.9);
        color: var(--figma-soft-text);
        box-shadow: none;
        font-family: "Tomorrow", sans-serif;
        font-size: 12px;
        line-height: 42px;
        appearance: none;
        -webkit-appearance: none;
      }

      .filter-inline select:focus {
        border-color: var(--color-accent);
        box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.22);
        outline: none;
      }

      .filter-inline option {
        background: #1a1228;
        color: #ffffff;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 22px;
        margin-top: 0;
      }

      .game {
        min-width: 0;
        height: auto;
        overflow: hidden;
        box-sizing: border-box;
        border: 1px solid rgba(168, 85, 247, 0.15);
        border-radius: 18px;
        background: var(--color-card);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
        transition:
          transform 0.18s ease,
          border-color 0.18s ease,
          border-width 0.18s ease,
          background 0.18s ease,
          box-shadow 0.18s ease,
          margin 0.18s ease;
      }

      @media (hover: hover) and (pointer: fine) {
        .game:hover,
        .game:focus {
          background: var(--color-card-hover);
          border: 2px solid rgba(168, 85, 247, 0.7);
          margin: -1px;
          box-shadow:
            0 18px 40px rgba(0, 0, 0, 0.4),
            0 0 24px rgba(168, 85, 247, 0.15);
          transform: translateY(-4px);
        }

        .game.list-item:hover,
        .game.list-item:focus {
          border: 2px solid rgba(168, 85, 247, 0.7);
          margin: -1px;
          box-shadow:
            0 14px 36px rgba(0, 0, 0, 0.4),
            0 0 20px rgba(168, 85, 247, 0.15);
          transform: translateY(-4px);
          z-index: 2;
        }
      }

      .game img {
        width: 100%;
        max-height: none;
        aspect-ratio: 1 / 1;
        border: 0;
        background: #1a1228;
        image-rendering: auto;
        object-fit: cover;
      }

      .game-info {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 14px 12px 16px;
        text-align: center;
        background: linear-gradient(180deg, transparent 0%, rgba(168, 85, 247, 0.04) 100%);
      }

      .game-info h3 {
        min-height: 40px;
        max-height: 40px;
        margin: 0;
        color: #ffffff;
        font-family: "Tomorrow", sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1px;
        line-height: 20px;
        text-shadow: none;
        width: 100%;
      }

      .game-info p {
        margin: 0;
        color: var(--figma-soft-text);
        font-family: "Tomorrow", sans-serif;
        font-size: 11px;
        letter-spacing: 0.4px;
        opacity: 0.8;
      }

      .card-actions {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        margin-top: 4px;
      }

      .platform-chip {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 999px;
        background: rgba(168, 85, 247, 0.18);
        border: 1px solid rgba(168, 85, 247, 0.3);
        color: #c4b0e8;
        font-family: "Tomorrow", sans-serif;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.5px;
        line-height: 18px;
        white-space: nowrap;
        order: 1;
      }

      .download-btn,
      .game:hover .download-btn {
        order: 2;
        width: 100%;
        max-width: 160px;
        height: 36px;
        gap: 6px;
        padding: 0 14px;
        border: none;
        border-radius: 999px;
        background: var(--figma-gradient);
        box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
        color: #ffffff;
        font-family: "Tomorrow", sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.3px;
        line-height: 20px;
        text-transform: uppercase;
        transform: none;
        margin-top: 4px;
        transition:
          background 0.18s ease,
          box-shadow 0.18s ease,
          transform 0.18s ease;
      }

      .download-btn::after {
        display: none;
      }

      .download-btn::before {
        display: none;
      }

      .download-btn:hover,
      .game:hover .download-btn:hover {
        background: linear-gradient(135deg, #ec4899, #a855f7);
        box-shadow: 0 6px 28px rgba(236, 72, 153, 0.5);
        transform: translateY(-1px);
        color: #ffffff;
      }

      .download-btn.downloaded {
        border: none;
        background: linear-gradient(135deg, #10b981, #34d399);
        color: #ffffff;
        box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4);
      }

      .download-btn.downloaded:hover {
        background: linear-gradient(135deg, #34d399, #10b981);
        box-shadow: 0 6px 22px rgba(16, 185, 129, 0.5);
      }

      .popular-badge,
      .downloaded-badge {
        border: 0;
        border-radius: 999px;
        background: var(--figma-gradient);
        box-shadow: 0 2px 10px rgba(168, 85, 247, 0.4);
        color: #ffffff;
        font-family: "Tomorrow", sans-serif;
        font-size: 10px;
        letter-spacing: 0.2px;
        animation: none;
      }

      .downloaded-badge {
        background: linear-gradient(135deg, #10b981, #34d399);
        box-shadow: 0 2px 10px rgba(16, 185, 129, 0.4);
      }

      .pagination-bar {
        padding: 24px 0 8px;
      }

      .pagination-btn {
        border: 1px solid rgba(168, 85, 247, 0.25);
        border-radius: 999px;
        background: rgba(17, 13, 30, 0.8);
        box-shadow: none;
        color: var(--figma-soft-text);
        font-family: "Tomorrow", sans-serif;
        transition:
          background 0.18s ease,
          border-color 0.18s ease,
          box-shadow 0.18s ease;
      }

      .pagination-btn.active,
      .pagination-btn:hover {
        border-color: var(--color-accent);
        background: var(--figma-gradient);
        box-shadow: 0 4px 16px rgba(168, 85, 247, 0.35);
        color: #ffffff;
      }

      .game.list-item {
        display: flex;
        position: relative;
        min-height: 120px;
        background: #000000;
        box-sizing: border-box;
      }

      .game.list-item .game-image-container {
        width: 120px;
        height: 120px;
        min-width: 120px;
        border-radius: 12px;
      }

      .game.list-item .game-info {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        grid-template-rows: auto auto;
        column-gap: 28px;
        row-gap: 10px;
        flex: 1;
        align-content: center;
        align-items: center;
        padding: 18px 24px;
        text-align: left;
      }

      .game.list-item .game-info h3 {
        grid-column: 1;
        grid-row: 1;
        width: 100%;
        min-height: auto;
        max-height: none;
        margin: 0;
      }

      .game.list-item .card-actions {
        display: contents;
      }

      .game.list-item .platform-chip {
        grid-column: 1;
        grid-row: 2;
        justify-self: start;
      }

      .game.list-item .download-btn,
      .game.list-item:hover .download-btn {
        grid-column: 2;
        grid-row: 1 / 3;
        justify-self: end;
        align-self: center;
        width: 150px;
        max-width: 150px;
        min-width: 150px;
        flex: 0 0 150px;
        margin-top: 0;
      }

      @media (min-width: 720px) {
        .game.list-item {
          grid-column: 1 / -1;
        }
      }

      @media (min-width: 761px) and (max-width: 1100px) {
        .sticky-search {
          padding: 20px 22px;
        }

        .search-bar-row {
          display: flex;
          flex-direction: column;
          align-items: stretch;
          gap: 16px;
        }

        .search-bar {
          display: flex;
          flex-direction: row;
          align-items: center;
          justify-content: space-between;
          gap: 16px;
          flex: none;
          width: 100%;
        }

        .search-bar input {
          flex: 1 1 auto;
          min-width: 0;
          width: auto;
        }

        .toggle-view-btn {
          position: static;
          flex: 0 0 48px;
          width: 48px;
          height: 48px;
          margin: 0;
          align-self: center;
        }

        .filter-inline {
          grid-column: 1 / -1;
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 18px;
          width: 100%;
        }

        .filter-field {
          gap: 8px;
        }

        .filter-field select {
          flex: 1 1 auto;
          min-width: 0;
          width: 100%;
        }
      }

      @media (max-width: 760px) {
        body {
          background:
            radial-gradient(ellipse at top left, rgba(168, 85, 247, 0.14) 0%, transparent 30rem),
            linear-gradient(180deg, #130d22 0%, var(--color-bg) 22rem) !important;
        }

        .container {
          max-width: none;
          width: min(100% - 28px, 1240px);
          min-height: auto;
          padding: 14px 0 24px;
        }

        .app-topbar {
          margin-bottom: 18px;
          padding: 22px 26px;
          border-radius: 22px;
        }

        .app-title {
          font-size: clamp(34px, 13vw, 52px);
          letter-spacing: -1px;
          line-height: 0.92;
          text-shadow: 4px 4px 0 #191919;
        }

        .app-title::after {
          max-width: 100%;
          margin-top: 16px;
          font-size: 16px;
          line-height: 1.45;
        }

        .sticky-search {
          position: relative;
          top: auto;
          margin-bottom: 22px;
          padding: 14px;
          border-radius: 18px;
          box-shadow: 0 12px 36px rgba(0, 0, 0, 0.24);
        }

        .search-bar-row {
          flex-direction: column;
          align-items: stretch;
          gap: 12px;
        }

        .search-bar {

          width: 100%;
          max-width: none;
        }

        .toggle-view-btn {
          position: absolute;
          display: inline-flex;
          right: 8px;
          top: 6px;
          width: 44px;
          height: 44px;
          margin: 0;

        }

        .search-bar input {

          height: 54px;
          font-size: 14px;
        }

        }

        .filter-field {

          gap: 6px;
          min-width: 0;
        }

          flex: 0 0 auto;
          min-width: auto;
          font-size: 11px;

        .filter-inline select {

          min-width: 0;
          height: 32px;
          padding: 0 28px 0 10px;

          line-height: 32px;
          background:
            linear-gradient(45deg, transparent 50%, #c4b0e8 50%) right 14px center / 5px 5px no-repeat,

            rgba(17, 13, 30, 0.9);
        }

        .filter-inline select:focus {
          box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.22);
        }

        .grid {

          padding: 2px 6px;

        .game img {
          border: 0;
          border-radius: 16px;
          image-rendering: auto;

        .game.list-item {

          grid-template-columns: 88px minmax(0, 1fr);

        .game.list-item .game-image-container {
          width: 88px;
          height: 112px;

        .sticky-search { position: sticky !important; top: 0 !important; }
        .search-bar input { height: 44px !important; font-size: 13px !important; }
        .toggle-view-btn { flex: 0 0 40px !important; width: 40px !important; height: 40px !important; }
        .filter-inline { gap: 8px !important; }

          top: 8px !important;

          border-radius: 14px !important;
        }
        .filter-inline select {
          min-width: 100px !important;

        .grid .game:not(.list-item) .game-info {

          min-height: 2.6em !important;
          max-height: 2.6em !important;

        }
        .grid .game:not(.list-item) .card-actions {
          margin-top: auto !important;

          padding: 4px 0 0 !important;
        }
        .grid .game:not(.list-item) .download-btn,
        .grid .game:not(.list-item) .game:hover .download-btn {
          display: flex !important;
          justify-content: center !important;
          align-items: center !important;
          margin-left: auto !important;
          margin-right: auto !important;
          width: 100% !important;
          max-width: 100% !important;

        .game.list-item {
          min-height: 112px !important;

        .game.list-item .game-image-container {
          width: 112px !important;

        }
        .game.list-item .game-info {
          padding: 14px 16px !important;
          column-gap: 16px !important;
        }
        .game.list-item .game-info h3 {
          font-size: 14px !important;
        }
        .game.list-item .platform-chip {
          font-size: 11px !important;
        }
        .game.list-item .download-btn,
        .game.list-item:hover .download-btn {
          width: 120px !important;
          min-width: 120px !important;
          max-width: 120px !important;

      @media (max-width: 460px) {
        .grid { gap: 8px !important; }

          min-width: 88px !important;

        }
        .toggle-view-btn {
          width: 40px !important;

          flex: 0 0 40px !important;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .game,
        .download-btn,
        .toggle-view-btn,
        .pagination-btn,
        .reload-btn {
          transition: none !important;
        }
      }

      /* ── Empty state ── */
      .empty-state {
        grid-column: 1 / -1;
        padding: 48px 24px;
        text-align: center;
        color: var(--figma-soft-text);
        font-family: "Poppins", sans-serif;
        font-size: 15px;
        font-weight: 500;
        line-height: 1.5;
        background: var(--color-card);
        border: 1px dashed var(--figma-border);
        border-radius: var(--radius-md);
      }
    </style>
  </head>
  <body>
    <!-- Loading overlay -->
    <div id="loading-overlay">
      <div class="loading-content">
        <div class="pixel-spinner">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
        <div class="loading-text">Loading games...</div>
        <button class="reload-btn" onclick="reloadPage()">Reload page</button>
      </div>
    </div>

    <div class="container">
      <div class="sticky-search">
        <div></div>
        <h1 class="page-title">All Download</h1>
        <div class="controls-bar">
          <div class="search-bar-row">
            <div class="search-bar">
              <input type="text" id="search-input" placeholder="Search game" oninput="searchGames()" />
            </div>
            <button
              id="toggle-view-btn"
              class="toggle-view-btn"
              type="button"
              onclick="toggleView()"
              aria-label="Toggle View"
            >
              <span class="icon-grid active"
                ><svg id="icon-grid" width="18" height="18" viewBox="0 0 20 20" fill="none">
                  <rect x="2" y="2" width="7" height="7" fill="#3d1208" rx="1.5" />
                  <rect x="11" y="2" width="7" height="7" fill="#3d1208" rx="1.5" />
                  <rect x="2" y="11" width="7" height="7" fill="#3d1208" rx="1.5" />
                  <rect x="11" y="11" width="7" height="7" fill="#3d1208" rx="1.5" /></svg
              ></span>
              <span class="icon-list"
                ><svg id="icon-list" width="18" height="18" viewBox="0 0 20 20" fill="none">
                  <rect x="2" y="3" width="16" height="3" fill="#3d1208" rx="1.5" />
                  <rect x="2" y="9" width="16" height="3" fill="#3d1208" rx="1.5" />
                  <rect x="2" y="15" width="16" height="3" fill="#3d1208" rx="1.5" /></svg
              ></span>
            </button>

          <div class="filter-inline">
            <div class="filter-field">
              <label for="platform-filter">Platform</label>
              <select id="platform-filter" onchange="filterGames()">
                <option value="">All</option>
              </select>
            </div>
            <div class="filter-field">
              <label for="region-filter">Region</label>
              <select id="region-filter" onchange="filterGames()">
                <option value="">All</option>
              </select>

        <!-- Platform filter pills (populated by JS) -->

      <div class="grid" id="game-list"></div>
      <div id="pagination" class="pagination-bar"></div>
    </div>
    <script src="script.js"></script>
    <script>
      // Disable long press actions while preserving scroll
      function preventContextMenu(e) {
        e.preventDefault();
      }
      function preventSelect(e) {
        e.preventDefault();
      }
      function preventDrag(e) {
        e.preventDefault();
      }

      // Apply context menu and selection prevention to document
      [document, document.body].forEach((el) => {
        el.addEventListener("contextmenu", preventContextMenu);
        el.addEventListener("selectstart", preventSelect);
        el.addEventListener("dragstart", preventDrag);
        // Remove touchstart prevention to allow scrolling
      });

      // Apply to specific elements that need long press prevention
      const longPressEls = document.querySelectorAll("a, img, button, input, textarea");
      longPressEls.forEach((el) => {
        el.addEventListener("contextmenu", preventContextMenu);
        el.addEventListener("selectstart", preventSelect);
        el.addEventListener("dragstart", preventDrag);
      });

      // Function to add improved touch handling for game cards
      function addTouchHandling(card) {
        let touchStartTime = 0;
        let touchStartY = 0;
        let touchStartX = 0;
        let isScrolling = false;

        card.addEventListener(
          "touchstart",
          function (e) {
            touchStartTime = Date.now();
            touchStartY = e.touches[0].clientY;
            touchStartX = e.touches[0].clientX;
            isScrolling = false;
          },
          { passive: true },
        );

        card.addEventListener(
          "touchmove",
          function (e) {
            const deltaY = Math.abs(e.touches[0].clientY - touchStartY);
            const deltaX = Math.abs(e.touches[0].clientX - touchStartX);

            // If user is scrolling (moved more than 15px), mark as scrolling
            if (deltaY > 15 || deltaX > 15) {
              isScrolling = true;
            }
          },
          { passive: true },
        );

        card.addEventListener(
          "touchend",
          function (e) {
            const touchDuration = Date.now() - touchStartTime;

            // Only trigger tap effect if not scrolling and quick tap
            if (!isScrolling && touchDuration < 300) {
              // Quick visual feedback for touch
              card.style.opacity = "0.8";
              setTimeout(() => {
                card.style.opacity = "";
              }, 100);
            }
          },
          { passive: true },
        );
      }

      // Apply touch handling to existing game cards
      document.querySelectorAll(".game").forEach(addTouchHandling);

      // Optimized observer for performance
      const observer = new MutationObserver(function (mutations) {
        // Use requestAnimationFrame to batch DOM updates
        requestAnimationFrame(() => {
          mutations.forEach(function (mutation) {
            mutation.addedNodes.forEach(function (node) {
              if (node.nodeType === 1) {
                // Element node
                if (node.classList && node.classList.contains("game")) {
                  addTouchHandling(node);
                }
                // Also check child elements
                const childCards = node.querySelectorAll && node.querySelectorAll(".game");
                if (childCards) {
                  childCards.forEach(addTouchHandling);
                }
              }
            });
          });
        });
      });

      // Start observing with optimized config
      observer.observe(document.getElementById("game-list"), {
        childList: true,
        subtree: false, // Only direct children to reduce overhead
      });
      // Simplified touch handling for mobile
      let pressTimer = null;
      let startY = null;
      let isDragging = false;

      // Only apply on mobile devices
      if ("ontouchstart" in window) {
        document.addEventListener(
          "touchstart",
          function (e) {
            startY = e.touches[0].clientY;
            isDragging = false;

            pressTimer = setTimeout(() => {
              if (!isDragging) {
                e.preventDefault();
              }
            }, 300);
          },
          { passive: false },
        );

        document.addEventListener(
          "touchmove",
          function (e) {
            if (startY !== null) {
              const deltaY = Math.abs(e.touches[0].clientY - startY);
              if (deltaY > 5) {
                isDragging = true;
                clearTimeout(pressTimer);
              }
            }
          },
          { passive: true },
        );

        document.addEventListener(
          "touchend",
          function () {
            clearTimeout(pressTimer);
            startY = null;
            isDragging = false;
          },
          { passive: true },
        );
      }
    </script>
  </body>
